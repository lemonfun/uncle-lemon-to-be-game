<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Uncle Lemon - To Be Verb Game</title>
<style>
  :root{
    --lemon:#FFD84D;
    --lemon2:#FFF3A6;
    --cream:#FFF9E8;
    --green:#78C850;
    --green2:#4CAF50;
    --orange:#FFB347;
    --brown:#5A3516;
    --blue:#8FD7FF;
    --pink:#FF9FCB;
    --card:#FFFDF4;
    --good:#57C46B;
    --bad:#FF6B6B;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
    background:
      radial-gradient(circle at 10% 15%, rgba(255,255,255,.7) 0 35px, transparent 36px),
      radial-gradient(circle at 90% 20%, rgba(255,255,255,.5) 0 28px, transparent 29px),
      linear-gradient(180deg, #FFE66D 0%, #FFF4A8 45%, #FFF8D7 100%);
    color:var(--brown);
    overflow-x:hidden;
  }
  .page{width:min(980px,100%); margin:0 auto; padding:14px;}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-bottom:12px;
  }
  .logo{
    display:flex; align-items:center; gap:10px;
    background:#fff9d8; border:4px solid white; border-radius:28px;
    padding:8px 14px; box-shadow:0 6px 0 rgba(194,150,0,.25);
  }
  .lemonFace{
    width:56px; height:56px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFF59E 0 18%, #FFD63D 19% 100%);
    border:4px solid #F0B900; position:relative;
  }
  .lemonFace:before,.lemonFace:after{content:""; position:absolute; width:7px; height:11px; border-radius:50%; background:#51320f; top:22px}
  .lemonFace:before{left:17px}.lemonFace:after{right:17px}
  .smile{position:absolute; left:18px; top:34px; width:20px; height:10px; border-bottom:4px solid #51320f; border-radius:0 0 20px 20px}
  .leaf{position:absolute; right:-8px; top:-7px; width:24px; height:14px; background:#65bd3d; border-radius:100% 0 100% 0; transform:rotate(-18deg); border:2px solid #3e8f24}
  .brand h1{font-size:26px; line-height:.85; margin:0; color:#fff; text-shadow:2px 2px 0 #6CBC37, -2px 2px 0 #6CBC37, 2px -2px 0 #6CBC37, -2px -2px 0 #6CBC37, 0 4px 0 #2f8f2e}
  .scoreBox{
    background:#fff9d8; border:4px solid #fff; border-radius:24px;
    padding:10px 16px; box-shadow:0 6px 0 rgba(194,150,0,.25);
    display:flex; gap:16px; align-items:center; font-weight:900; font-size:17px;
  }
  .mainCard{
    background:rgba(255,253,244,.94);
    border:5px solid #fff;
    border-radius:34px;
    padding:14px;
    box-shadow:0 10px 0 rgba(194,150,0,.22), 0 18px 30px rgba(125,91,0,.16);
    position:relative;
    overflow:hidden;
  }
  .instruction{
    text-align:center; font-size:24px; font-weight:900; margin:4px 0 12px;
    background:#fff5c9; border:3px solid #f4c535; border-radius:22px; padding:10px;
  }
  .progressWrap{height:18px; background:#fff1aa; border:3px solid #fff; border-radius:999px; overflow:hidden; margin:6px 8px 14px}
  .progress{height:100%; width:0%; background:linear-gradient(90deg,#8ad85a,#ffd84d); border-radius:999px; transition:.3s}
  .questionArea{
    display:grid; grid-template-columns: 1fr 1fr; gap:16px; align-items:stretch;
  }
  .picture{
    background:linear-gradient(#9fe4ff 0 55%, #9fe072 56% 100%);
    border:4px solid #F4C535; border-radius:28px; min-height:360px;
    position:relative; overflow:hidden; box-shadow:inset 0 -5px 0 rgba(0,0,0,.05);
  }
  .sentencePanel{
    background:#fffef7;
    border:4px solid #f4c535; border-radius:28px;
    padding:18px; display:flex; flex-direction:column; justify-content:center;
  }
  .qNum{
    display:inline-flex; width:48px; height:48px; align-items:center; justify-content:center;
    border-radius:50%; background:#FFD23F; border:4px solid #fff;
    font-size:26px; font-weight:900; box-shadow:0 4px 0 rgba(100,70,0,.18);
    margin-bottom:8px;
  }
  .sentence{font-size:34px; font-weight:900; text-align:center; line-height:1.2; margin:6px 0 18px}
  .answers{display:grid; gap:12px}
  button.answer{
    font-family:inherit; font-size:25px; font-weight:900; color:var(--brown);
    background:#fff9e8; border:4px solid #f0c033; border-radius:22px;
    padding:12px 14px; cursor:pointer; box-shadow:0 5px 0 #dca400;
    transition:transform .1s, background .2s;
  }
  button.answer:hover{transform:translateY(-2px)}
  button.answer.correct{background:#d9ffd8; border-color:#56bd56; box-shadow:0 5px 0 #319431}
  button.answer.wrong{background:#ffe1dc; border-color:#ff746e; box-shadow:0 5px 0 #d84b45}
  button.answer:disabled{cursor:default}
  .feedback{
    min-height:48px; text-align:center; font-size:24px; font-weight:900; margin-top:12px;
  }
  .controls{display:flex; justify-content:center; gap:12px; margin-top:14px; flex-wrap:wrap}
  .bigBtn{
    border:none; border-radius:24px; padding:14px 24px; font-size:24px; font-weight:900;
    font-family:inherit; cursor:pointer; color:white; background:#49b85b; box-shadow:0 6px 0 #2b8f3b;
  }
  .bigBtn.secondary{background:#37a7e8; box-shadow:0 6px 0 #147bb4}
  .bigBtn:disabled{filter:grayscale(.6); opacity:.55; cursor:not-allowed}
  .finish{
    display:none; text-align:center; padding:26px;
  }
  .finish h2{font-size:42px; margin:8px 0}
  .finish p{font-size:26px; font-weight:800}
  .starRain{font-size:48px}

  /* illustration helpers */
  .sun{position:absolute; width:70px; height:70px; border-radius:50%; background:#ffd846; right:30px; top:25px; box-shadow:0 0 0 14px rgba(255,216,70,.25)}
  .cloud{position:absolute; width:85px; height:28px; background:white; border-radius:30px; opacity:.9}
  .cloud:before,.cloud:after{content:""; position:absolute; background:white; border-radius:50%}
  .cloud:before{width:38px;height:38px;left:10px;top:-16px}.cloud:after{width:48px;height:48px;left:34px;top:-24px}
  .ground{position:absolute; left:0; right:0; bottom:0; height:90px; background:#86d761}
  .person{position:absolute; width:95px; height:185px; bottom:54px; left:50%; transform:translateX(-50%)}
  .head{position:absolute; left:22px; top:0; width:54px; height:54px; border-radius:50%; background:#ffd2a3; border:3px solid #6a3c1a}
  .hair{position:absolute; left:18px; top:-3px; width:62px; height:32px; border-radius:50% 50% 18px 18px; background:#7b421c}
  .eye{position:absolute; width:6px; height:8px; background:#3e2413; border-radius:50%; top:24px}
  .eye.l{left:35px}.eye.r{right:35px}
  .mouth{position:absolute; left:41px; top:36px; width:16px; height:8px; border-bottom:3px solid #a33; border-radius:0 0 15px 15px}
  .body{position:absolute; left:17px; top:58px; width:64px; height:76px; border-radius:18px; background:#ffd847; border:3px solid #996d00}
  .leg{position:absolute; top:132px; width:18px; height:48px; background:#336dcc; border-radius:10px}
  .leg.l{left:28px}.leg.r{right:28px}
  .arm{position:absolute; top:68px; width:18px; height:62px; background:#ffd2a3; border:3px solid #6a3c1a; border-radius:14px}
  .arm.l{left:2px; transform:rotate(25deg)} .arm.r{right:2px; transform:rotate(-25deg)}
  .balloon{position:absolute; width:54px; height:70px; border-radius:50%; background:#ff7bad; border:3px solid #d8417d; left:68%; top:52px}
  .string{position:absolute; width:2px; height:120px; background:#7a4a2a; left:72%; top:118px}
  .cat{position:absolute; left:50%; bottom:100px; transform:translateX(-50%); width:230px; height:118px; background:#ee8b36; border:4px solid #8a4b19; border-radius:80px 90px 70px 70px}
  .cat:before,.cat:after{content:""; position:absolute; top:-26px; width:48px; height:48px; background:#ee8b36; border:4px solid #8a4b19; transform:rotate(45deg)}
  .cat:before{left:28px}.cat:after{right:28px}
  .catFace{position:absolute; left:55px; top:28px; width:90px; height:62px}
  .cat .z{position:absolute; right:25px; top:-40px; font-size:38px; color:#5387d8; font-weight:900}
  .sleepEye{position:absolute; top:22px; width:25px; height:12px; border-bottom:4px solid #5c2a11; border-radius:0 0 20px 20px}
  .sleepEye.l{left:5px}.sleepEye.r{right:5px}
  .nose{position:absolute; left:40px; top:36px; width:12px; height:9px; background:#5c2a11; border-radius:50%}
  .kidsGroup .person{transform:scale(.82); bottom:47px}
  .kidsGroup .p1{left:32%}.kidsGroup .p2{left:50%}.kidsGroup .p3{left:68%}
  .boy .body{background:#ff7657}.blue .body{background:#55bcff}.greenShirt .body{background:#67c45c}
  .icecream{position:absolute; right:28%; bottom:142px; width:38px; height:38px; border-radius:50%; background:#ff9dcc; border:3px solid #a85a3f}
  .icecream:after{content:""; position:absolute; left:9px; top:33px; width:18px; height:42px; background:#d98b38; clip-path:polygon(0 0,100% 0,50% 100%)}
  .table{position:absolute; left:40px; right:40px; bottom:62px; height:45px; background:#d99445; border-radius:20px; border:4px solid #9d5f22}
  .plate{position:absolute; width:74px; height:22px; border-radius:50%; background:white; border:4px solid #ddd; bottom:94px}
  .plate.one{left:27%}.plate.two{right:27%}
  .school{position:absolute; left:48%; bottom:86px; transform:translateX(-50%); width:170px; height:145px; background:#ffd06c; border:4px solid #9b6428; border-radius:8px}
  .school:before{content:""; position:absolute; left:45px; top:-60px; border-left:40px solid transparent; border-right:40px solid transparent; border-bottom:60px solid #e84c3d}
  .school:after{content:""; position:absolute; left:69px; top:35px; width:32px; height:32px; border-radius:50%; background:white; border:4px solid #4b94c4}
  .flag{position:absolute; left:57%; top:38px; width:55px; height:34px; background:#ff5959; clip-path:polygon(0 0,100% 15%,0 35%); z-index:3}
  .calendar{position:absolute; left:18px; bottom:110px; width:100px; height:78px; background:white; border:4px solid #9b6428; border-radius:8px; text-align:center; padding-top:30px; font-weight:900}
  .calendar:before{content:"YESTERDAY"; position:absolute; top:8px; left:0; right:0; font-size:13px; color:#8b1e1e}
  .soccer{position:absolute; left:50%; bottom:95px; width:52px; height:52px; background:white; border:4px solid #333; border-radius:50%}
  .clock{position:absolute; right:55px; top:55px; width:90px; height:90px; border-radius:50%; background:white; border:6px solid #48a8d8}
  .clock:before{content:""; position:absolute; left:40px; top:18px; width:6px; height:28px; background:#245}
  .clock:after{content:""; position:absolute; left:42px; top:42px; width:26px; height:5px; background:#245; transform:rotate(-25deg); transform-origin:left center}
  .thumb{position:absolute; right:36%; bottom:175px; font-size:52px}
  .night{background:linear-gradient(#172a63 0 60%, #394a78 61% 100%)}
  .moon{position:absolute; right:55px; top:40px; width:56px; height:56px; border-radius:50%; background:#ffe68a}
  .moon:after{content:""; position:absolute; left:18px; top:-3px; width:52px; height:60px; border-radius:50%; background:#172a63}
  .dog{position:absolute; bottom:88px; width:150px; height:75px; background:#d8a36d; border:4px solid #80512c; border-radius:55px}
  .dog.one{left:20%}.dog.two{right:20%; background:#e7c39d}
  .dog:before{content:""; position:absolute; left:12px; top:-30px; width:58px; height:58px; border-radius:50%; background:inherit; border:4px solid #80512c}
  .heart{position:absolute; right:28%; top:60px; font-size:46px; color:#ff73a8}
.question-img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:24px;
}  
@media(max-width:760px){
    .topbar{align-items:flex-start}
    .brand h1{font-size:20px}.lemonFace{width:45px;height:45px}
    .scoreBox{font-size:15px; padding:8px 10px}
    .instruction{font-size:18px}
    .questionArea{grid-template-columns:1fr}
    .picture{min-height:300px}
    .sentence{font-size:28px}
    button.answer{font-size:22px}
  }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="logo">
      <div class="lemonFace"><div class="leaf"></div><div class="smile"></div></div>
      <div class="brand"><h1>UNCLE<br>LEMON</h1></div>
    </div>
    <div class="scoreBox">
      <div>⭐ Stars: <span id="stars">0</span></div>
      <div>🍋 Coins: <span id="coins">0</span></div>
    </div>
  </div>

  <div class="mainCard" id="gameCard">
    <div class="instruction">Choose the correct word to complete the sentence.</div>
    <div class="progressWrap"><div class="progress" id="progress"></div></div>
    <div class="questionArea">
      <div class="picture" id="picture"></div>
      <div class="sentencePanel">
        <div class="qNum" id="qNum">1</div>
        <div class="sentence" id="sentence">I ___ happy.</div>
        <div class="answers" id="answers"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>
    <div class="controls">
      <button class="bigBtn secondary" onclick="speakSentence()">🔊 Listen</button>
      <button class="bigBtn" id="nextBtn" onclick="nextQuestion()" disabled>Next ➜</button>
    </div>
  </div>

  <div class="mainCard finish" id="finishCard">
    <div class="starRain">⭐ 🍋 ⭐</div>
    <h2>Great job!</h2>
    <p>You finished the Uncle Lemon grammar game.</p>
    <p>Your score: <span id="finalScore"></span> / 10</p>
    <button class="bigBtn" onclick="restartGame()">Play Again 🔁</button>
  </div>
</div>

<script>
const questions = [
  {s:"I ___ happy.", a:["am","is","are"], c:"am", pic:"happyGirl"},
  {s:"The cat ___ sleepy.", a:["am","is","are"], c:"is", pic:"sleepyCat"},
  {s:"They ___ friends.", a:["am","is","are"], c:"are", pic:"friends"},
  {s:"He ___ sad.", a:["is not","are not","am not"], c:"is not", pic:"notSad"},
  {s:"We ___ hungry.", a:["is not","are not","am not"], c:"are not", pic:"notHungry"},
  {s:"She ___ at school yesterday.", a:["were","was","is"], c:"was", pic:"school"},
  {s:"The boys ___ in the park.", a:["was","were","is"], c:"were", pic:"parkBoys"},
  {s:"I ___ late this morning.", a:["was not","were not","am not"], c:"was not", pic:"notLate"},
  {s:"The dogs ___ noisy last night.", a:["was not","were not","are not"], c:"were not", pic:"quietDogs"},
  {s:"You ___ my best friend.", a:["am","is","are"], c:"are", pic:"bestFriend"}
];

let order=[], index=0, score=0, answered=false;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function restartGame(){
  order = shuffle([...Array(questions.length).keys()]);
  index=0; score=0; answered=false;
  document.getElementById("stars").textContent=0;
  document.getElementById("coins").textContent=0;
  document.getElementById("finishCard").style.display="none";
  document.getElementById("gameCard").style.display="block";
  showQuestion();
}
function showQuestion(){
  answered=false;
  const q=questions[order[index]];
  document.getElementById("qNum").textContent=index+1;
  document.getElementById("sentence").textContent=q.s;
  document.getElementById("feedback").textContent="";
  document.getElementById("nextBtn").disabled=true;
  document.getElementById("progress").style.width=((index)/questions.length*100)+"%";
  drawPicture(q.pic);
  const answers=document.getElementById("answers");
  answers.innerHTML="";
  shuffle(q.a).forEach(choice=>{
    const btn=document.createElement("button");
    btn.className="answer";
    btn.textContent=choice;
    btn.onclick=()=>checkAnswer(btn,choice,q.c);
    answers.appendChild(btn);
  });
}
function checkAnswer(btn,choice,correct){
  if(answered)return;
  answered=true;
  const all=document.querySelectorAll(".answer");
  all.forEach(b=>b.disabled=true);
  if(choice===correct){
    btn.classList.add("correct");
    score++;
    document.getElementById("stars").textContent=score;
    document.getElementById("coins").textContent=score*10;
    document.getElementById("feedback").textContent="Great job! ⭐";
  }else{
    btn.classList.add("wrong");
    all.forEach(b=>{ if(b.textContent===correct)b.classList.add("correct"); });
    document.getElementById("feedback").textContent="Good try! The answer is “" + correct + "”.";
  }
  document.getElementById("nextBtn").disabled=false;
}
function nextQuestion(){
  index++;
  if(index>=questions.length){
    document.getElementById("progress").style.width="100%";
    document.getElementById("gameCard").style.display="none";
    document.getElementById("finishCard").style.display="block";
    document.getElementById("finalScore").textContent=score;
  }else showQuestion();
}
function speakSentence(){
  const q=questions[order[index]];
  const text=q.s.replace("___","blank");
  if("speechSynthesis" in window){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US";
    u.rate=.82;
    speechSynthesis.speak(u);
  }
}
function baseScene(extra="", cls=""){
  return `<div class="${cls}">
    <div class="sun"></div><div class="cloud" style="left:25px;top:45px"></div><div class="cloud" style="right:55px;top:110px;transform:scale(.75)"></div>
    <div class="ground"></div>${extra}</div>`;
}
function person(cls="", style=""){
  return `<div class="person ${cls}" style="${style}">
    <div class="head"><div class="hair"></div><div class="eye l"></div><div class="eye r"></div><div class="mouth"></div></div>
    <div class="body"></div><div class="arm l"></div><div class="arm r"></div><div class="leg l"></div><div class="leg r"></div>
  </div>`;
}
function drawPicture(type){

  const images = {
    "happyGirl": "images/01_i_am_happy.png",
    "sleepyCat": "images/02_cat_is_sleepy.png",
    "friends": "images/03_they_are_friends.png",
    "notSad": "images/04_he_is_not_sad.png",
    "notHungry": "images/05_we_are_not_hungry.png",
    "school": "images/06_she_was_school.png",
    "parkBoys": "images/07_boys_were_park.png",
    "notLate": "images/08_i_was_not_late.png",
    "quietDogs": "images/09_dogs_were_not_noisy.png",
    "bestFriend": "images/10_you_are_best_friend.png"
  };

  document.getElementById("picture").innerHTML =
    `<img src="${images[type]}" class="question-img">`;
}

restartGame();
</script>
</body>
</html>
